name: CI

on:
  push:
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: pip install uv --quiet

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Compile Python
        run: uv run python -m py_compile $(find app tests -name '*.py' -print)

      - name: Lint (ruff)
        continue-on-error: true
        run: uv run ruff check .

      - name: Test
        run: |
          uv run python -m pytest \
            --ignore=tests/test_conversation_refinement_stream.py \
            --deselect=tests/test_twin_profile_api.py::test_trigger_extraction

      - name: Alembic upgrade on scratch SQLite
        run: uv run python -m alembic upgrade head
        env:
          DATABASE_URL: sqlite:////tmp/fronei_ci_migration.db

      - name: FastAPI OpenAPI import check
        run: uv run python -c "from app.main import app; app.openapi(); print('openapi ok')"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build
