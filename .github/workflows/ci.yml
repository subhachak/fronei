name: CI

on:
  push:
  pull_request:

jobs:
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  api:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite:////tmp/fronei_ci.db
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install uv
        run: pip install uv --quiet

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Install AgentDeck PptxGenJS renderer deps
        working-directory: apps/api/pptx_render
        run: npm ci --omit=dev

      - name: Compile Python
        run: uv run python -m py_compile $(find app tests -name '*.py' -print)

      - name: Lint (ruff)
        continue-on-error: true
        run: uv run ruff check .

      - name: Migrate test database
        run: uv run python -m alembic upgrade head

      - name: Deterministic agent evaluations
        run: uv run python -m app.evals.runner --format github

      - name: Test
        run: uv run python -m pytest

      - name: Alembic upgrade chain on fresh scratch SQLite
        run: uv run python -m alembic upgrade head
        env:
          DATABASE_URL: sqlite:////tmp/fronei_ci_fresh_migration.db

      - name: FastAPI OpenAPI import check
        run: uv run python -c "from app.main import app; app.openapi(); print('openapi ok')"

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Build
        run: npm run build
