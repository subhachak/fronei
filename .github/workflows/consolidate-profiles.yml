name: Consolidate Fronei Profiles

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - name: Call profile consolidator
        run: |
          curl -fsS -X POST "$FRONEI_API_URL/internal/consolidate-profiles" \
            -H "X-Internal-Secret: $INTERNAL_TASK_SECRET"
        env:
          FRONEI_API_URL: ${{ secrets.FRONEI_API_URL }}
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
