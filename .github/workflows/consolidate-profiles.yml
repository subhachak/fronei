name: Consolidate Fronei Profiles

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

jobs:
  consolidate:
    runs-on: ubuntu-latest
    steps:
      - name: Enqueue durable profile consolidation
        run: |
          response=$(curl -fsS -X POST "$FRONEI_API_URL/internal/consolidate-profiles" \
            -H "X-Internal-Secret: $INTERNAL_TASK_SECRET")
          echo "$response"
          job_id=$(echo "$response" | python3 -c "import json,sys; print(json.load(sys.stdin)['job']['id'])")
          echo "JOB_ID=$job_id" >> "$GITHUB_ENV"
        env:
          FRONEI_API_URL: ${{ secrets.FRONEI_API_URL }}
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}

      - name: Wait for durable job completion
        run: |
          for i in $(seq 1 80); do
            response=$(curl -fsS "$FRONEI_API_URL/internal/maintenance-jobs/$JOB_ID" \
              -H "X-Internal-Secret: $INTERNAL_TASK_SECRET")
            echo "$response"
            status=$(echo "$response" | python3 -c "import json,sys; print(json.load(sys.stdin)['job']['status'])")
            if [ "$status" = "completed" ]; then
              exit 0
            fi
            if [ "$status" = "failed" ]; then
              exit 1
            fi
            sleep 15
          done
          echo "Job is still durable and may continue, but this workflow timed out waiting."
          exit 1
        env:
          FRONEI_API_URL: ${{ secrets.FRONEI_API_URL }}
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
