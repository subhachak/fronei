# Plan gate policy — decides whether a turn executes immediately ("auto") or
# requires one bundled confirmation popup ("confirm") before execution.
#
# See docs/unified-plan-architecture.md for the full design. This file holds
# only the tunable thresholds; the decision logic itself lives in
# app/services/plan_gate.py.

# Web search: needs_web_search is true, but only "material" criticality gates.
web_search:
  # Criticality values the planner may return. Anything not listed here
  # falls back to `default_criticality`.
  gating_criticalities: [material]
  default_criticality: material

# Deep research: recommend_deep_research always gates, regardless of confidence.
# suggested_mode_risk_factors: if any of the plan's research_risk_factors match
# this list, the gate suggests the "expert" tier (more sources, mandatory
# verifier pass, stricter source filtering) instead of the "deep" default.
# This is only a suggestion surfaced in the plan_proposed popup — the user's
# explicit choice in the popup or composer always wins.
deep_research:
  always_gate: true
  suggested_mode_risk_factors: [medical, financial, legal_regulatory]

# Document output: gates when the brief is incomplete or there's a format choice.
document:
  # Brief fields whose absence (null/empty) is considered "ambiguous".
  required_brief_fields: [doc_type, audience, tone, length]
  # Gate when more than this many plausible formats are offered.
  max_silent_format_options: 1

# Overall plan confidence: "low" gates only if there are open_questions to
# surface to the user. A low-confidence plan with no open questions (e.g. a
# passthrough/no-op plan) has nothing to confirm and runs in "auto" mode.
plan_confidence:
  gating_levels: [low]

# Formats the document generator can actually produce today. Anything else
# the planner proposes is shown disabled ("coming soon") in the format picker.
supported_document_formats: [markdown, docx, xlsx]
