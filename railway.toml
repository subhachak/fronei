[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile.api"

[deploy]
# Schema migrations run as Railway's "Pre-Deploy Command" (set in the
# Railway dashboard: Service -> Settings -> Deploy -> Pre-Deploy Command),
# NOT in startCommand. Pre-Deploy Command runs once to completion before
# the new instance receives traffic, while the OLD instance keeps serving
# requests — so a migration that errors (e.g. lock_timeout from
# alembic/env.py) fails the deploy cleanly without taking prod down.
#
# Set Pre-Deploy Command to:
#   uv run alembic upgrade head
startCommand = "uv run uvicorn app.main:app --host 0.0.0.0 --port 8080"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway doesn't read env vars from this file (set them in the dashboard or via
# `railway variables set KEY=value`). Required variables:
#
# APP_ENV=production
# DATABASE_URL=<your Neon connection string>
# ALLOWED_ORIGINS=https://fronei-new.vercel.app
# DEFAULT_PROFILE=balanced
# CLERK_ISSUER=<from Clerk dashboard>
# CLERK_AUDIENCE=fronei-api
# ADMIN_USER_IDS=<your Clerk user id>
# ADMIN_EMAILS=subhachak@gmail.com
#
# Optional: Clerk Backend API secret key (Clerk dashboard -> API Keys ->
# Secret keys, starts with sk_). Lets the admin Users tab show each user's
# real name/email instead of just their Clerk user id.
# CLERK_SECRET_KEY=sk_live_...
#
# New-signup approval gate (default true): new users must be activated by
# an admin before they can chat. Admins (above) are exempt automatically.
# REQUIRE_USER_APPROVAL=true
#
# Email notification on new signups (optional — logs only if unset):
# SMTP_HOST=smtp.gmail.com
# SMTP_PORT=587
# SMTP_USER=<smtp username>
# SMTP_PASSWORD=<smtp password / app password>
# SMTP_FROM=<from address, defaults to SMTP_USER>
# NOTIFICATION_EMAILS=subhachak@gmail.com
#
# Nightly personalization consolidation (optional but recommended once
# UserProfile is enabled): set a secret, then create a Railway Cron service or
# external scheduled job that POSTs:
#   /internal/consolidate-profiles
# with header:
#   X-Internal-Secret: <same secret>
# INTERNAL_TASK_SECRET=<random long secret>
#
# Concurrency caps — conservative for the 512MB starter plan; these can likely
# go back to code defaults (4/6/5/4) once on a 1GB+ plan.
# Start conservative, raise after confirming stable memory usage:
# MAX_QUESTION_WORKERS=2
# MAX_CLAIM_EXTRACT_WORKERS=3
# MAX_DOCUMENT_WORKERS=2
# MAX_DECOMPOSE_WORKERS=2
# TURN_WORKER_CONCURRENCY=2
# TURN_WORKER_LEASE_SECONDS=90
# TURN_WORKER_MAX_ATTEMPTS=3
#
# Provider keys (set at least one):
# OPENAI_API_KEY=
# ANTHROPIC_API_KEY=
# GEMINI_API_KEY=
# OPENROUTER_API_KEY=
# TAVILY_API_KEY=
# BRAVE_API_KEY=
