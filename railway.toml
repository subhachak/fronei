[build]
builder = "DOCKERFILE"
dockerfilePath = "infra/Dockerfile.api"

[deploy]
startCommand = "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8080"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway doesn't read env vars from this file (set them in the dashboard or via
# `railway variables set KEY=value`). Required variables:
#
# APP_ENV=production
# DATABASE_URL=<your Neon connection string>
# ALLOWED_ORIGINS=https://fronei-new.vercel.app
# DEFAULT_PROFILE=balanced
# DAILY_BUDGET_USD=10
# CLERK_ISSUER=<from Clerk dashboard>
# CLERK_AUDIENCE=fronei-api
# ADMIN_USER_IDS=<your Clerk user id>
# ADMIN_EMAILS=subhachak@gmail.com
#
# New-signup approval gate (default true): new users must be activated by
# an admin before they can chat. Admins (above) are exempt automatically.
# REQUIRE_USER_APPROVAL=true
#
# Email notification on new signups (optional — logs only if unset):
# SMTP_HOST=smtp.gmail.com
# SMTP_PORT=587
# SMTP_USER=<smtp username>
# SMTP_PASSWORD=<smtp password / app password>
# SMTP_FROM=<from address, defaults to SMTP_USER>
# NOTIFICATION_EMAILS=subhachak@gmail.com
#
# Concurrency caps — conservative for the 512MB starter plan; these can likely
# go back to code defaults (4/6/5/4) once on a 1GB+ plan.
# Start conservative, raise after confirming stable memory usage:
# MAX_QUESTION_WORKERS=2
# MAX_CLAIM_EXTRACT_WORKERS=3
# MAX_DOCUMENT_WORKERS=2
# MAX_DECOMPOSE_WORKERS=2
#
# Provider keys (set at least one):
# OPENAI_API_KEY=
# ANTHROPIC_API_KEY=
# GEMINI_API_KEY=
# OPENROUTER_API_KEY=
# TAVILY_API_KEY=
# BRAVE_API_KEY=
