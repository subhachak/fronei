services:
  - type: web
    name: fronei-api
    env: python
    rootDir: apps/api
    # Node.js + pptxgenjs are required by the AgentDeck PptxGenJS renderer
    # (pptx_render/). Without a `node` binary on PATH,
    # _agentdeck_renderer_available() is always False and
    # generate_agentdeck_pptx_bytes() raises "agentdeck renderer unavailable"
    # for every presentation request. Render's python env build runs as a
    # non-root user, so install a local Node toolchain instead of apt-get.
    buildCommand: |
      pip install -e .
      curl -fsSL https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.xz -o /tmp/node.tar.xz
      mkdir -p ./node-runtime
      tar -xJf /tmp/node.tar.xz -C ./node-runtime --strip-components=1
      cd pptx_render && ../node-runtime/bin/npm install --omit=dev
    # Run Alembic migrations before starting the server so schema is always
    # up to date. create_all() is disabled in production (models.py init_db),
    # so this is the only mechanism that applies pending migrations on deploy.
    preDeployCommand: alembic upgrade head
    startCommand: PATH="$PWD/node-runtime/bin:$PATH" uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # paste your Postgres URL from Supabase / Neon / Render DB
      - key: ALLOWED_ORIGINS
        sync: false          # set to your Vercel frontend URL, e.g. https://fronei.vercel.app
      - key: DEFAULT_PROFILE
        value: balanced
      - key: DAILY_BUDGET_USD
        value: "10"
      - key: CLERK_ISSUER
        sync: false
      - key: CLERK_AUDIENCE
        sync: false          # required when APP_ENV=production — API will not start without this
      - key: CLERK_AUTHORIZED_PARTIES
        sync: false          # comma-separated frontend origins checked against the Clerk token azp claim
      - key: ADMIN_USER_IDS
        sync: false          # comma-separated Clerk user IDs allowed to access /admin
      - key: ADMIN_EMAILS
        sync: false          # optional comma-separated admin emails
      # Lower concurrency caps for the 512MB free instance — raise on bigger plans
      - key: MAX_QUESTION_WORKERS
        value: "2"
      - key: MAX_CLAIM_EXTRACT_WORKERS
        value: "3"
      - key: MAX_DOCUMENT_WORKERS
        value: "2"
      - key: MAX_DECOMPOSE_WORKERS
        value: "2"
      # Set at least one provider key — leave others blank
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: BRAVE_API_KEY
        sync: false
